<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>お金管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #F3F4F6;
      color: #111827;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }

    .month-nav { display: flex; align-items: center; gap: 8px; }
    .month-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .month-btn:active { background: rgba(255,255,255,0.35); }
    .month-label { font-size: 14px; font-weight: 600; min-width: 78px; text-align: center; }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: white;
      border-top: 1px solid #E5E7EB;
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: #9CA3AF;
      font-size: 10px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: #4F46E5; }

    /* ===== CONTENT ===== */
    .content {
      padding: 14px 14px;
      padding-bottom: calc(70px + env(safe-area-inset-bottom));
    }

    /* ===== CARDS ===== */
    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    /* ===== TOTAL CARD ===== */
    .total-card {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
    .total-amount { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .total-sub { font-size: 11px; opacity: 0.7; margin-top: 4px; }
    .total-emoji { font-size: 42px; }

    /* ===== CATEGORY CARD ===== */
    .cat-card { padding: 13px 16px; }
    .cat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
    }
    .cat-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .cat-icon-lg { font-size: 21px; }
    .amount-group { text-align: right; }
    .remaining-amount { font-size: 17px; font-weight: 800; line-height: 1; }
    .remaining-amount.ok { color: #10B981; }
    .remaining-amount.warn { color: #F59E0B; }
    .remaining-amount.over { color: #EF4444; }
    .spent-label { font-size: 11px; color: #9CA3AF; margin-top: 3px; }

    .progress-bar { height: 5px; background: #F3F4F6; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .progress-fill.ok { background: #10B981; }
    .progress-fill.warn { background: #F59E0B; }
    .progress-fill.over { background: #EF4444; }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 6px 2px 10px;
    }

    /* ===== FORM ===== */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: #6B7280; margin-bottom: 7px; letter-spacing: 0.04em; }
    .form-input, .form-select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E5E7EB;
      border-radius: 11px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      background: white;
      color: #111827;
      font-family: inherit;
      appearance: none;
    }
    .form-input:focus, .form-select:focus { border-color: #4F46E5; }
    .amount-input {
      font-size: 28px;
      font-weight: 800;
      text-align: right;
      letter-spacing: -0.5px;
      color: #111827;
    }

    /* ===== CATEGORY GRID ===== */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .cat-pick-btn {
      padding: 10px 4px 8px;
      border: 2px solid #E5E7EB;
      border-radius: 11px;
      background: white;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: #6B7280;
      transition: all 0.15s;
    }
    .cat-pick-btn .pick-icon { font-size: 24px; line-height: 1; }
    .cat-pick-btn.selected {
      border-color: #4F46E5;
      background: #EEF2FF;
      color: #4F46E5;
    }
    .cat-pick-btn:active { transform: scale(0.95); }

    /* ===== PRIMARY BUTTON ===== */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white;
      border: none;
      border-radius: 13px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-text {
      background: none;
      border: none;
      color: #4F46E5;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      padding: 0;
    }

    /* ===== BUDGET ROWS ===== */
    .budget-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid #F9FAFB;
    }
    .budget-row:last-child { border-bottom: none; }
    .budget-cat-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      font-size: 14px;
      font-weight: 600;
    }
    .budget-input-wrap { width: 110px; }
    .budget-num-input {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #E5E7EB;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 700;
      text-align: right;
      outline: none;
      font-family: inherit;
      background: #FAFAFA;
    }
    .budget-num-input:focus { border-color: #4F46E5; background: white; }

    /* ===== HISTORY ===== */
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid #F9FAFB;
    }
    .history-item:last-child { border-bottom: none; }
    .history-left { display: flex; align-items: center; gap: 10px; }
    .history-icon-wrap {
      width: 38px; height: 38px;
      background: #F3F4F6;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      flex-shrink: 0;
    }
    .history-cat { font-size: 13px; font-weight: 700; }
    .history-memo { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
    .history-right { text-align: right; flex-shrink: 0; }
    .history-amount { font-size: 15px; font-weight: 800; color: #EF4444; }
    .history-date { font-size: 11px; color: #9CA3AF; margin-top: 2px; }
    .history-delete {
      background: none;
      border: none;
      color: #D1D5DB;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 6px;
      margin-left: 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .history-delete:active { color: #EF4444; background: #FEF2F2; }

    .month-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 2px 8px;
      cursor: pointer;
    }
    .month-section-title { font-size: 15px; font-weight: 700; }
    .month-section-total { font-size: 14px; font-weight: 800; color: #EF4444; }
    .month-section-toggle { font-size: 12px; color: #9CA3AF; margin-left: 6px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: calc(75px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(17, 24, 39, 0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 22px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 200;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== LOADING / EMPTY ===== */
    .loading { display: flex; justify-content: center; align-items: center; padding: 60px; }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid #E5E7EB;
      border-top-color: #4F46E5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 50px 20px; color: #9CA3AF; }
    .empty-icon { font-size: 50px; margin-bottom: 10px; }
    .empty-text { font-size: 13px; line-height: 1.6; }

    /* ===== ERROR BANNER ===== */
    .error-banner {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 12px 14px;
      color: #DC2626;
      font-size: 13px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">💴 お金管理</div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label">読込中</span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="switchTab('home')">
      <span class="nav-icon">📊</span><span>概要</span>
    </button>
    <button class="nav-btn" id="nav-add" onclick="switchTab('add')">
      <span class="nav-icon">➕</span><span>支出入力</span>
    </button>
    <button class="nav-btn" id="nav-budget" onclick="switchTab('budget')">
      <span class="nav-icon">🎯</span><span>予算設定</span>
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📋</span><span>履歴</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =========================================
// CONFIG
// =========================================
const SUPABASE_URL = 'https://ospiyfmijbpvwkgwhim.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zcGl5Zm1pamJwdndrd2d3aGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTY3MTMsImV4cCI6MjA5MjAzMjcxM30.rT3C8GDrmQiVGVOxEfWT-1CQ3y0yiAAzA1pvhqHH8wM';

// =========================================
// REST API ラッパー（Supabase JS 不要）
// =========================================
const H = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Accept': 'application/json'
};

async function dbSelect(table, filters = {}, order = '') {
  let q = Object.entries(filters).map(([k, v]) => `${k}=eq.${encodeURIComponent(v)}`).join('&');
  if (order) q += (q ? '&' : '') + `order=${order}`;
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&${q}`, { headers: H });
  if (!r.ok) throw await r.json();
  return r.json();
}

async function dbInsert(table, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST', headers: H, body: JSON.stringify(body)
  });
  if (!r.ok) throw await r.json();
}

async function dbUpsert(table, body, onConflict) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
    method: 'POST',
    headers: { ...H, 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw await r.json();
}

async function dbDelete(table, id) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE', headers: H
  });
  if (!r.ok) throw await r.json();
}

const CATEGORIES = ['食費', '日用品', '外食費', '子ども費', '医療費', 'お小遣い', 'その他'];
const ICONS = {
  '食費': '🍚', '日用品': '🧴', '外食費': '🍽️',
  '子ども費': '👶', '医療費': '🏥', 'お小遣い': '💰', 'その他': '📦'
};

// =========================================
// STATE
// =========================================
let currentYear, currentMonth;
let currentTab = 'home';
let budgets = {};
let expenses = [];
let selectedCategory = null;

// =========================================
// INIT
// =========================================
async function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  updateMonthLabel();

  // 接続診断
  showLoading();
  const diag = await diagnose();
  if (diag) {
    document.getElementById('content').innerHTML = diag;
    return;
  }
  loadData();
}

async function diagnose() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/budgets?select=id&limit=1`, { headers: H });
    if (r.ok || r.status === 401 || r.status === 403 || r.status === 404) return null;
    const body = await r.text();
    return `<div class="error-banner"><strong>Supabase エラー (HTTP ${r.status})</strong><br><pre style="font-size:11px;margin-top:8px;white-space:pre-wrap">${body}</pre></div>
            <button class="btn-primary" style="margin-top:8px" onclick="location.reload()">再試行</button>`;
  } catch (e) {
    return `<div class="error-banner"><strong>接続失敗: ${e.message}</strong><br><br>
      ① Supabase ダッシュボードでプロジェクトが<b>アクティブ</b>か確認<br>
      ② <code>python3 -m http.server 8080</code> でサーバーが起動中か確認<br>
      ③ <code>http://localhost:8080</code> で開いているか確認
    </div>
    <button class="btn-primary" style="margin-top:8px" onclick="location.reload()">再試行</button>`;
  }
}

function updateMonthLabel() {
  document.getElementById('month-label').textContent = `${currentYear}年${currentMonth}月`;
}

async function loadData() {
  showLoading();
  try {
    await Promise.all([loadBudgets(), loadExpenses()]);
    renderTab();
  } catch (e) {
    console.error('loadData error:', e);
    document.getElementById('content').innerHTML = `
      <div class="error-banner">
        <strong>読み込みエラー</strong><br>
        ${e.message || JSON.stringify(e)}<br><br>
        <small style="color:#991B1B">コード: ${e.code || e.status || '不明'} / ${e.hint || e.details || ''}</small>
      </div>
      <button class="btn-primary" style="margin-top:12px" onclick="loadData()">再試行</button>
    `;
  }
}

async function loadBudgets() {
  const data = await dbSelect('budgets', { year: currentYear, month: currentMonth });
  budgets = {};
  data.forEach(b => { budgets[b.category] = b.amount; });
}

async function loadExpenses() {
  expenses = await dbSelect('expenses',
    { year: currentYear, month: currentMonth },
    'expense_date.desc,created_at.desc'
  );
}

// =========================================
// MONTH NAVIGATION
// =========================================
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  updateMonthLabel();
  loadData();
}

// =========================================
// TAB SWITCHING
// =========================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${tab}`).classList.add('active');
  renderTab();
}

function renderTab() {
  switch (currentTab) {
    case 'home':    renderHome(); break;
    case 'add':     renderAdd(); break;
    case 'budget':  renderBudget(); break;
    case 'history': renderHistory(); break;
  }
}

function showLoading() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
}

// =========================================
// HOME TAB
// =========================================
function renderHome() {
  const totalBudget = CATEGORIES.reduce((s, c) => s + (budgets[c] || 0), 0);
  const totalSpent  = expenses.reduce((s, e) => s + e.amount, 0);
  const totalLeft   = totalBudget - totalSpent;

  let html = `
    <div class="total-card">
      <div>
        <div class="total-label">今月の残り予算</div>
        <div class="total-amount">${fmtYen(totalLeft)}</div>
        <div class="total-sub">${fmtYen(totalSpent)} 使用 ／ ${fmtYen(totalBudget)} 予算</div>
      </div>
      <div class="total-emoji">💴</div>
    </div>
  `;

  if (totalBudget === 0) {
    html += `
      <div class="card" style="text-align:center;padding:28px 16px">
        <div style="font-size:44px;margin-bottom:10px">🎯</div>
        <div style="font-size:14px;color:#6B7280;margin-bottom:18px;line-height:1.6">
          まだ今月の予算が設定されていません。<br>予算を設定して管理を始めましょう。
        </div>
        <button class="btn-primary" style="width:auto;padding:12px 28px;display:inline-block" onclick="switchTab('budget')">
          予算を設定する
        </button>
      </div>
    `;
  }

  html += '<div class="section-title">カテゴリ別残額</div>';

  CATEGORIES.forEach(cat => {
    const budget = budgets[cat] || 0;
    const spent  = expenses.filter(e => e.category === cat).reduce((s, e) => s + e.amount, 0);
    const left   = budget - spent;
    const pct    = budget > 0 ? Math.min((spent / budget) * 100, 100) : (spent > 0 ? 100 : 0);
    const status = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : 'ok';

    html += `
      <div class="card cat-card">
        <div class="cat-header">
          <div class="cat-name">
            <span class="cat-icon-lg">${ICONS[cat]}</span>
            <span>${cat}</span>
          </div>
          <div class="amount-group">
            <div class="remaining-amount ${status}">${fmtYen(left)}</div>
            <div class="spent-label">${fmtYen(spent)} 使用 ／ ${fmtYen(budget)}</div>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill ${status}" style="width:${pct}%"></div>
        </div>
      </div>
    `;
  });

  document.getElementById('content').innerHTML = html;
}

// =========================================
// ADD TAB
// =========================================
function renderAdd() {
  const today = todayStr();

  const catBtns = CATEGORIES.map(cat => `
    <button class="cat-pick-btn ${selectedCategory === cat ? 'selected' : ''}"
            onclick="pickCategory('${cat}')">
      <span class="pick-icon">${ICONS[cat]}</span>
      <span>${cat}</span>
    </button>
  `).join('');

  const recentItems = expenses.slice(0, 5);
  const recentHtml = recentItems.length === 0 ? '' : `
    <div class="section-title" style="margin-top:8px">直近の支出</div>
    <div class="card">
      ${recentItems.map(e => `
        <div class="history-item">
          <div class="history-left">
            <div class="history-icon-wrap">${ICONS[e.category]}</div>
            <div>
              <div class="history-cat">${e.category}</div>
              ${e.memo ? `<div class="history-memo">${e.memo}</div>` : ''}
            </div>
          </div>
          <div class="history-right">
            <div class="history-amount">-${fmtYen(e.amount)}</div>
            <div class="history-date">${fmtDate(e.expense_date)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="form-group">
        <div class="form-label">カテゴリ</div>
        <div class="cat-grid">${catBtns}</div>
      </div>
      <div class="form-group">
        <div class="form-label">金額（円）</div>
        <input type="number" class="form-input amount-input" id="inp-amount"
               placeholder="0" inputmode="numeric" pattern="[0-9]*" min="1">
      </div>
      <div class="form-group">
        <div class="form-label">メモ（任意）</div>
        <input type="text" class="form-input" id="inp-memo" placeholder="例：スーパーで購入">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <div class="form-label">日付</div>
        <input type="date" class="form-input" id="inp-date" value="${today}">
      </div>
      <button class="btn-primary" id="btn-submit" onclick="submitExpense()">支出を記録する</button>
    </div>
    ${recentHtml}
  `;

  // フォーカス後に数字キーボードを開く
  setTimeout(() => {
    if (selectedCategory) {
      document.getElementById('inp-amount').focus();
    }
  }, 100);
}

function pickCategory(cat) {
  selectedCategory = cat;
  document.querySelectorAll('.cat-pick-btn').forEach(b => {
    const name = b.querySelector('span:last-child').textContent;
    b.classList.toggle('selected', name === cat);
  });
  document.getElementById('inp-amount').focus();
}

async function submitExpense() {
  const amountEl = document.getElementById('inp-amount');
  const memoEl   = document.getElementById('inp-memo');
  const dateEl   = document.getElementById('inp-date');
  const btn      = document.getElementById('btn-submit');

  const amount = parseInt(amountEl.value);
  const memo   = memoEl.value.trim();
  const date   = dateEl.value;

  if (!selectedCategory)       { showToast('カテゴリを選んでください'); return; }
  if (!amount || amount <= 0)  { showToast('金額を入力してください'); amountEl.focus(); return; }
  if (!date)                   { showToast('日付を選択してください'); return; }

  const d = new Date(date);
  const year  = d.getFullYear();
  const month = d.getMonth() + 1;

  btn.disabled = true;
  btn.textContent = '記録中…';

  try {
    await dbInsert('expenses', { year, month, category: selectedCategory, amount, memo: memo || null, expense_date: date });
  } catch (e) {
    showToast('エラーが発生しました');
    console.error(e);
    btn.disabled = false;
    btn.textContent = '支出を記録する';
    return;
  }

  showToast(`${ICONS[selectedCategory]} ${selectedCategory} ${fmtYen(amount)} を記録しました`);
  amountEl.value = '';
  memoEl.value   = '';

  // 同じ月なら即反映
  if (year === currentYear && month === currentMonth) {
    await loadExpenses();
  }
  renderAdd();
}

// =========================================
// BUDGET TAB
// =========================================
function renderBudget() {
  const total = CATEGORIES.reduce((s, c) => s + (budgets[c] || 0), 0);

  const rows = CATEGORIES.map(cat => `
    <div class="budget-row">
      <div class="budget-cat-info">
        <span style="font-size:22px">${ICONS[cat]}</span>
        <span>${cat}</span>
      </div>
      <div class="budget-input-wrap">
        <input type="number" class="budget-num-input"
               id="bgt-${cat.replace(/\s/g,'')}"
               value="${budgets[cat] || ''}"
               placeholder="0"
               inputmode="numeric" pattern="[0-9]*">
      </div>
    </div>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:15px;font-weight:700">${currentYear}年${currentMonth}月の予算</div>
        <div style="font-size:12px;color:#9CA3AF" id="budget-total-display">合計 ${fmtYen(total)}</div>
      </div>
      ${rows}
    </div>
    <button class="btn-primary" id="btn-save-budget" onclick="saveBudgets()">予算を保存する</button>
    <p style="text-align:center;font-size:12px;color:#9CA3AF;margin-top:14px">
      前月の予算をコピー：<button class="btn-text" onclick="copyLastMonth()">コピーする</button>
    </p>
  `;

  // 入力値が変わるたびに合計を更新
  CATEGORIES.forEach(cat => {
    const id = 'bgt-' + cat.replace(/\s/g,'');
    document.getElementById(id).addEventListener('input', updateBudgetTotal);
  });
}

function updateBudgetTotal() {
  const total = CATEGORIES.reduce((s, cat) => {
    const id = 'bgt-' + cat.replace(/\s/g,'');
    const el = document.getElementById(id);
    return s + (parseInt(el?.value) || 0);
  }, 0);
  const el = document.getElementById('budget-total-display');
  if (el) el.textContent = '合計 ' + fmtYen(total);
}

async function saveBudgets() {
  const btn = document.getElementById('btn-save-budget');
  btn.disabled = true;
  btn.textContent = '保存中…';

  const upsertData = CATEGORIES.map(cat => {
    const id = 'bgt-' + cat.replace(/\s/g,'');
    return {
      year: currentYear,
      month: currentMonth,
      category: cat,
      amount: parseInt(document.getElementById(id).value) || 0
    };
  });

  try {
    await dbUpsert('budgets', upsertData, 'year,month,category');
  } catch (e) {
    showToast('エラーが発生しました');
    console.error(e);
    btn.disabled = false;
    btn.textContent = '予算を保存する';
    return;
  }

  await loadBudgets();
  showToast('予算を保存しました');
  btn.disabled = false;
  btn.textContent = '予算を保存する';
  renderBudget();
}

async function copyLastMonth() {
  let y = currentYear, m = currentMonth - 1;
  if (m < 1) { m = 12; y--; }

  let data;
  try { data = await dbSelect('budgets', { year: y, month: m }); } catch (e) { data = []; }

  if (!data || data.length === 0) {
    showToast('前月の予算データがありません');
    return;
  }

  data.forEach(b => {
    const id = 'bgt-' + b.category.replace(/\s/g,'');
    const el = document.getElementById(id);
    if (el) el.value = b.amount;
  });
  updateBudgetTotal();
  showToast('前月の予算をコピーしました');
}

// =========================================
// HISTORY TAB
// =========================================
async function renderHistory() {
  showLoading();

  // 直近6ヶ月分を取得
  const months = [];
  for (let i = 0; i < 6; i++) {
    let m = currentMonth - i, y = currentYear;
    if (m < 1) { m += 12; y--; }
    months.push({ year: y, month: m });
  }

  const results = await Promise.all(
    months.map(({ year, month }) =>
      dbSelect('expenses', { year, month }, 'expense_date.desc,created_at.desc').catch(() => [])
    )
  );

  let html = '';
  let hasAny = false;

  results.forEach((items, i) => {
    const { year, month } = months[i];
    if (items.length === 0) return;
    hasAny = true;
    const total = items.reduce((s, e) => s + e.amount, 0);
    const isCurrentMonth = (i === 0);

    html += `
      <div class="card" style="padding:0 16px">
        <div class="month-section-header" onclick="toggleMonthSection('ms-${year}-${month}', this)">
          <div class="month-section-title">${year}年${month}月</div>
          <div style="display:flex;align-items:center">
            <span class="month-section-total">-${fmtYen(total)}</span>
            <span class="month-section-toggle">${isCurrentMonth ? '▾' : '▸'}</span>
          </div>
        </div>
        <div id="ms-${year}-${month}" style="${isCurrentMonth ? '' : 'display:none'}">
          ${items.map(e => `
            <div class="history-item" id="exp-${e.id}">
              <div class="history-left">
                <div class="history-icon-wrap">${ICONS[e.category]}</div>
                <div>
                  <div class="history-cat">${e.category}</div>
                  ${e.memo ? `<div class="history-memo">${e.memo}</div>` : ''}
                </div>
              </div>
              <div style="display:flex;align-items:center">
                <div class="history-right">
                  <div class="history-amount">-${fmtYen(e.amount)}</div>
                  <div class="history-date">${fmtDate(e.expense_date)}</div>
                </div>
                <button class="history-delete" onclick="deleteExpense('${e.id}', ${year}, ${month})" title="削除">✕</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  if (!hasAny) {
    html = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">まだ支出の記録がありません</div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = html;
}

function toggleMonthSection(id, header) {
  const el  = document.getElementById(id);
  const tog = header.querySelector('.month-section-toggle');
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  tog.textContent  = open ? '▸' : '▾';
}

async function deleteExpense(id, year, month) {
  if (!confirm('この支出を削除しますか？')) return;

  try { await dbDelete('expenses', id); } catch (e) { showToast('削除に失敗しました'); return; }

  // 現在の表示月なら expenses を更新
  if (year === currentYear && month === currentMonth) {
    expenses = expenses.filter(e => e.id !== id);
  }

  showToast('削除しました');
  renderHistory();
}

// =========================================
// UTILS
// =========================================
function fmtYen(n) {
  if (n === null || n === undefined) return '¥0';
  return (n < 0 ? '-¥' : '¥') + Math.abs(n).toLocaleString('ja-JP');
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2800);
}

// =========================================
// START
// =========================================
init();
</script>
